trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

variables:
  NPM_CONFIG_CACHE: $(Pipeline.Workspace)/.npm

stages:
  - stage: Quality
    displayName: Quality
    jobs:
      - job: MatrixQuality
        displayName: Lint, format, and coverage
        strategy:
          matrix:
            node20:
              NODE_VERSION: '20.x'
            node22:
              NODE_VERSION: '22.x'
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self
            clean: true

          - task: NodeTool@0
            displayName: Use Node.js $(NODE_VERSION)
            inputs:
              versionSpec: $(NODE_VERSION)

          - task: Cache@2
            displayName: Cache npm
            inputs:
              key: 'npm | "$(Agent.OS)" | $(NODE_VERSION) | package-lock.json'
              restoreKeys: |
                npm | "$(Agent.OS)" | $(NODE_VERSION)
                npm | "$(Agent.OS)"
              path: $(NPM_CONFIG_CACHE)

          - script: npm ci --legacy-peer-deps --ignore-scripts
            displayName: Install dependencies

          - script: npm rebuild better-sqlite3
            displayName: Rebuild native modules

          - script: npm run lint
            displayName: Lint

          - script: npm run format:check
            displayName: Check formatting

          - script: npm run test:coverage
            displayName: Run unit and integration coverage

          - task: PublishTestResults@2
            displayName: Publish Jest results
            condition: succeededOrFailed()
            inputs:
              testResultsFormat: JUnit
              testResultsFiles: 'coverage/test-results/junit.xml'
              searchFolder: '$(System.DefaultWorkingDirectory)'
              failTaskOnFailedTests: true
              testRunTitle: 'Jest coverage ($(NODE_VERSION))'

          - task: PublishCodeCoverageResults@2
            displayName: Publish coverage report
            condition: succeededOrFailed()
            inputs:
              summaryFileLocation: '$(System.DefaultWorkingDirectory)/coverage/cobertura-coverage.xml'
              pathToSources: '$(System.DefaultWorkingDirectory)/src'
              failIfCoverageEmpty: true

      - job: E2E
        displayName: Docker SSH e2e
        dependsOn: MatrixQuality
        pool:
          vmImage: ubuntu-latest
        variables:
          NODE_VERSION: '20.x'
        steps:
          - checkout: self
            clean: true

          - task: NodeTool@0
            displayName: Use Node.js $(NODE_VERSION)
            inputs:
              versionSpec: $(NODE_VERSION)

          - task: Cache@2
            displayName: Cache npm
            inputs:
              key: 'npm | "$(Agent.OS)" | $(NODE_VERSION) | package-lock.json'
              restoreKeys: |
                npm | "$(Agent.OS)" | $(NODE_VERSION)
                npm | "$(Agent.OS)"
              path: $(NPM_CONFIG_CACHE)

          - script: npm ci --legacy-peer-deps --ignore-scripts
            displayName: Install dependencies

          - script: npm rebuild better-sqlite3
            displayName: Rebuild native modules

          - script: docker compose -f docker-compose.test.yml up -d --build
            displayName: Start SSH fixture

          - script: npm run test:e2e
            displayName: Run SSH e2e tests

          - script: docker compose -f docker-compose.test.yml logs
            displayName: Dump SSH fixture logs on failure
            condition: failed()

          - script: docker compose -f docker-compose.test.yml down --volumes
            displayName: Stop SSH fixture
            condition: always()

          - task: PublishTestResults@2
            displayName: Publish e2e test results
            condition: succeededOrFailed()
            inputs:
              testResultsFormat: JUnit
              testResultsFiles: 'coverage/test-results/junit.xml'
              searchFolder: '$(System.DefaultWorkingDirectory)'
              failTaskOnFailedTests: true
              testRunTitle: 'Jest e2e ($(NODE_VERSION))'

  - stage: Build
    displayName: Build
    dependsOn: Quality
    jobs:
      - job: BuildPackage
        displayName: Build package and container
        pool:
          vmImage: ubuntu-latest
        variables:
          NODE_VERSION: '20.x'
        steps:
          - checkout: self
            clean: true

          - task: NodeTool@0
            displayName: Use Node.js $(NODE_VERSION)
            inputs:
              versionSpec: $(NODE_VERSION)

          - task: Cache@2
            displayName: Cache npm
            inputs:
              key: 'npm | "$(Agent.OS)" | $(NODE_VERSION) | package-lock.json'
              restoreKeys: |
                npm | "$(Agent.OS)" | $(NODE_VERSION)
                npm | "$(Agent.OS)"
              path: $(NPM_CONFIG_CACHE)

          - script: npm ci --legacy-peer-deps --ignore-scripts
            displayName: Install dependencies

          - script: npm rebuild better-sqlite3
            displayName: Rebuild native modules

          - script: npm run build
            displayName: Build TypeScript output

          - script: docker build -t mcp-infra-lens:ci .
            displayName: Build Docker image
