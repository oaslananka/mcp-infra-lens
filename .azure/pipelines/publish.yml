trigger: none

pool:
  vmImage: ubuntu-latest

steps:
  - checkout: self
    persistCredentials: true

  - task: NodeTool@0
    inputs:
      versionSpec: '20.x'
    displayName: Use Node.js 20

  - script: npm ci --legacy-peer-deps --ignore-scripts
    displayName: Install dependencies

  - script: npm rebuild better-sqlite3
    displayName: Rebuild native modules

  - script: npm run build
    displayName: Build package

  - task: Npm@1
    displayName: Publish to npm registry via npm-connection
    inputs:
      command: publish
      publishRegistry: useExternalRegistry
      publishEndpoint: npm-connection

  - script: echo "Release completed for mcp-infra-lens"
    displayName: Publish summary
